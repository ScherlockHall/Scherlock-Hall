!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎰 Sorteador Pro - Cassino</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Orbitron:wght@400;700;900&display=swap"
    rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Orbitron', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      overflow-x: hidden;
      color: #ffd700;
    }

    /* CANVAS DE FUNDO */
    #casino-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* OVERLAY GRADIENTE */
    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(26, 107, 60, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(139, 0, 0, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
      z-index: 1;
      pointer-events: none;
    }

    /* LETREIRO NEON */
    .neon-border {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #ff1493, #ffd700, #00ff00, #00bfff, #ff1493);
      background-size: 200% 100%;
      animation: neon-flow 3s linear infinite;
      z-index: 100;
      box-shadow: 0 0 20px #ff1493, 0 0 40px #ffd700, 0 0 60px #00ff00;
    }

    @keyframes neon-flow {
      0% {
        background-position: 0% 50%;
      }

      100% {
        background-position: 200% 50%;
      }
    }

    .neon-border-bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #ffd700, #ff1493, #00bfff, #00ff00, #ffd700);
      background-size: 200% 100%;
      animation: neon-flow 3s linear infinite reverse;
      z-index: 100;
      box-shadow: 0 0 20px #ffd700, 0 0 40px #ff1493, 0 0 60px #00bfff;
    }

    /* NAIPES FLUTUANTES */
    .floating-suits {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }

    .suit {
      position: absolute;
      font-size: 2rem;
      opacity: 0.15;
      animation: float-suit 15s infinite ease-in-out;
    }

    .suit:nth-child(1) {
      left: 5%;
      animation-delay: 0s;
      color: #ff1493;
    }

    .suit:nth-child(2) {
      left: 15%;
      animation-delay: 2s;
      color: #ffd700;
    }

    .suit:nth-child(3) {
      left: 25%;
      animation-delay: 4s;
      color: #00ff00;
    }

    .suit:nth-child(4) {
      left: 35%;
      animation-delay: 6s;
      color: #00bfff;
    }

    .suit:nth-child(5) {
      left: 45%;
      animation-delay: 1s;
      color: #ff1493;
    }

    .suit:nth-child(6) {
      left: 55%;
      animation-delay: 3s;
      color: #ffd700;
    }

    .suit:nth-child(7) {
      left: 65%;
      animation-delay: 5s;
      color: #00ff00;
    }

    .suit:nth-child(8) {
      left: 75%;
      animation-delay: 7s;
      color: #00bfff;
    }

    .suit:nth-child(9) {
      left: 85%;
      animation-delay: 0.5s;
      color: #ff1493;
    }

    .suit:nth-child(10) {
      left: 95%;
      animation-delay: 2.5s;
      color: #ffd700;
    }

    @keyframes float-suit {

      0%,
      100% {
        transform: translateY(100vh) rotate(0deg) scale(1);
        opacity: 0;
      }

      10% {
        opacity: 0.2;
      }

      90% {
        opacity: 0.2;
      }

      100% {
        transform: translateY(-100px) rotate(360deg) scale(1.5);
        opacity: 0;
      }
    }

    /* LUZES PISCANDO LATERAIS */
    .casino-lights {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 30px;
      z-index: 3;
      pointer-events: none;
    }

    .casino-lights.left {
      left: 10px;
    }

    .casino-lights.right {
      right: 10px;
    }

    .light-bulb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      animation: bulb-blink 0.5s infinite alternate;
    }

    .light-bulb:nth-child(odd) {
      background: #ffd700;
      box-shadow: 0 0 10px #ffd700, 0 0 20px #ffd700, 0 0 30px #ffd700;
    }

    .light-bulb:nth-child(even) {
      background: #ff1493;
      box-shadow: 0 0 10px #ff1493, 0 0 20px #ff1493, 0 0 30px #ff1493;
    }

    @keyframes bulb-blink {
      0% {
        opacity: 0.3;
        transform: scale(0.8);
      }

      100% {
        opacity: 1;
        transform: scale(1.2);
      }
    }

    /* PÁGINAS */
    .page {
      display: none;
      min-height: 100vh;
      padding: 30px 20px;
      position: relative;
      z-index: 10;
      animation: fadeIn 0.5s ease-in-out;
    }

    .page.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .game-container {
      width: 100%;
      max-width: 650px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }

    /* HEADER */
    .game-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      font-size: 5rem;
      margin-bottom: 15px;
      animation: bounce 2s infinite, glow-pulse 1.5s infinite alternate;
      display: inline-block;
      filter: drop-shadow(0 0 20px #ffd700);
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0) rotate(-5deg);
      }

      50% {
        transform: translateY(-15px) rotate(5deg);
      }
    }

    @keyframes glow-pulse {
      0% {
        filter: drop-shadow(0 0 20px #ffd700);
      }

      100% {
        filter: drop-shadow(0 0 40px #ff1493);
      }
    }

    .game-title {
      font-family: 'Righteous', cursive;
      font-size: 3rem;
      font-weight: 900;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #ffd700 0%, #ffed4e 25%, #ffd700 50%, #b8860b 75%, #ffd700 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shine 3s linear infinite;
      text-shadow: none;
      filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.5));
    }

    @keyframes shine {
      0% {
        background-position: 0% center;
      }

      100% {
        background-position: 200% center;
      }
    }

    .game-subtitle {
      font-size: 1rem;
      color: #c0c0c0;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* CARDS */
    .game-card {
      background: linear-gradient(145deg, rgba(13, 77, 43, 0.9) 0%, rgba(10, 10, 10, 0.95) 100%);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 35px;
      box-shadow:
        0 10px 40px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 215, 0, 0.3),
        inset 0 -1px 0 rgba(0, 0, 0, 0.5);
      border: 2px solid;
      border-image: linear-gradient(135deg, #ffd700, #b8860b, #ffd700) 1;
      position: relative;
      overflow: hidden;
    }

    .game-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg,
          transparent 30%,
          rgba(255, 215, 0, 0.03) 50%,
          transparent 70%);
      animation: card-shine 4s linear infinite;
    }

    @keyframes card-shine {
      0% {
        transform: translateX(-100%) rotate(45deg);
      }

      100% {
        transform: translateX(100%) rotate(45deg);
      }
    }

    .card-section {
      margin-bottom: 30px;
      position: relative;
      z-index: 1;
    }

    .game-label {
      display: flex;
      align-items: center;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 15px;
      gap: 10px;
      color: #ffd700;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .label-icon {
      font-size: 1.5rem;
    }

    .game-select,
    .game-input {
      width: 100%;
      padding: 15px 20px;
      font-size: 1rem;
      font-family: 'Orbitron', sans-serif;
      border: 2px solid rgba(255, 215, 0, 0.3);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: #ffd700;
      font-weight: 500;
      transition: all 0.3s;
    }

    .game-select option {
      background: #0a0a0a;
      color: #ffd700;
    }

    .game-select:focus,
    .game-input:focus {
      outline: none;
      border-color: #ffd700;
      background: rgba(0, 0, 0, 0.9);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }

    .game-input::placeholder {
      color: rgba(255, 215, 0, 0.5);
    }

    /* GRADE DE NÚMEROS */
    .number-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
    }

    .num-btn {
      padding: 15px 10px;
      font-size: 1.2rem;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      border: 2px solid rgba(255, 215, 0, 0.4);
      border-radius: 10px;
      background: linear-gradient(145deg, rgba(139, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.5) 100%);
      color: #ffd700;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .num-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.2), transparent);
      transition: left 0.5s;
    }

    .num-btn:hover::before {
      left: 100%;
    }

    .num-btn:hover {
      background: linear-gradient(145deg, rgba(139, 0, 0, 0.5) 0%, rgba(26, 107, 60, 0.3) 100%);
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(255, 215, 0, 0.2);
    }

    .num-btn.active {
      background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
      color: #0a0a0a;
      border-color: #ffd700;
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
      transform: scale(1.05);
    }

    /* BOTÕES */
    .game-btn {
      width: 100%;
      padding: 18px 30px;
      font-size: 1.1rem;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .game-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s;
    }

    .game-btn:hover::before {
      left: 100%;
    }

    .game-btn-primary {
      background: linear-gradient(135deg, #ffd700 0%, #b8860b 50%, #ffd700 100%);
      background-size: 200% 100%;
      color: #0a0a0a;
      border: 2px solid #ffd700;
      animation: btn-shine 3s linear infinite;
    }

    @keyframes btn-shine {
      0% {
        background-position: 0% 50%;
      }

      100% {
        background-position: 200% 50%;
      }
    }

    .game-btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
    }

    .game-btn-danger {
      background: linear-gradient(135deg, #c41e3a 0%, #8b0000 50%, #c41e3a 100%);
      background-size: 200% 100%;
      color: #ffd700;
      border: 3px solid #ffd700;
      font-size: 1.5rem;
      padding: 25px 50px;
      animation: btn-shine 2s linear infinite;
      box-shadow:
        0 0 20px rgba(255, 215, 0, 0.3),
        inset 0 0 20px rgba(255, 215, 0, 0.1);
    }

    .game-btn-danger:hover {
      transform: scale(1.05);
      box-shadow:
        0 0 40px rgba(255, 215, 0, 0.5),
        0 0 60px rgba(196, 30, 58, 0.5);
    }

    .game-btn-danger:disabled {
      background: #333;
      border-color: #555;
      color: #666;
      cursor: not-allowed;
      transform: none;
      animation: none;
      box-shadow: none;
    }

    .game-btn-secondary {
      background: linear-gradient(145deg, rgba(26, 107, 60, 0.5) 0%, rgba(0, 0, 0, 0.7) 100%);
      color: #ffd700;
      border: 2px solid rgba(255, 215, 0, 0.5);
    }

    .game-btn-secondary:hover {
      background: linear-gradient(145deg, rgba(26, 107, 60, 0.7) 0%, rgba(0, 0, 0, 0.9) 100%);
      border-color: #ffd700;
      transform: translateY(-3px);
      box-shadow: 0 5px 20px rgba(255, 215, 0, 0.2);
    }

    .btn-icon {
      font-size: 1.3rem;
    }

    .btn-arrow {
      font-size: 1.5rem;
      margin-left: auto;
    }

    /* GRADE DE NOMES */
    .names-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      position: relative;
      z-index: 1;
    }

    .nome-input {
      padding: 15px 20px;
      font-size: 1rem;
      font-family: 'Orbitron', sans-serif;
      border: 2px solid rgba(255, 215, 0, 0.3);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: #ffd700;
      font-weight: 500;
      transition: all 0.3s;
    }

    .nome-input:focus {
      outline: none;
      border-color: #ffd700;
      background: rgba(0, 0, 0, 0.9);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }

    .nome-input::placeholder {
      color: rgba(255, 215, 0, 0.5);
    }

    /* SLOT MACHINE */
    .slot-machine-wrapper {
      margin: 40px 0;
      display: flex;
      justify-content: center;
    }

    .slot-machine {
      position: relative;
    }

    .slot-glow {
      position: absolute;
      top: -30px;
      left: -30px;
      right: -30px;
      bottom: -30px;
      background: radial-gradient(circle, rgba(255, 215, 0, 0.3) 0%, transparent 70%);
      border-radius: 30px;
      animation: pulse-glow 2s infinite;
    }

    @keyframes pulse-glow {

      0%,
      100% {
        opacity: 0.5;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.05);
      }
    }

    .slot-frame {
      position: relative;
      width: 480px;
      height: 200px;
      background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
      border-radius: 20px;
      padding: 25px;
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.8),
        inset 0 2px 10px rgba(255, 215, 0, 0.2),
        inset 0 -5px 20px rgba(0, 0, 0, 0.5);
      border: 4px solid;
      border-image: linear-gradient(135deg, #ffd700, #b8860b, #ffd700, #b8860b, #ffd700) 1;
    }

    .slot-window {
      position: relative;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #000 0%, #0a0a0a 50%, #000 100%);
      border-radius: 10px;
      overflow: hidden;
      box-shadow:
        inset 0 10px 30px rgba(0, 0, 0, 0.9),
        inset 0 0 50px rgba(255, 215, 0, 0.1);
    }

    .slot-reel {
      position: absolute;
      width: 100%;
      top: 0;
      left: 0;
    }

    .slot-item {
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-family: 'Righteous', cursive;
      font-weight: 800;
      color: #ffd700;
      text-shadow:
        0 0 10px #ffd700,
        0 0 20px #ffd700,
        0 4px 15px rgba(0, 0, 0, 0.8);
      background: linear-gradient(180deg, #1a6b3c 0%, #0d4d2b 50%, #1a6b3c 100%);
      border-bottom: 2px solid rgba(255, 215, 0, 0.3);
    }

    .slot-item:nth-child(4n+1) {
      background: linear-gradient(180deg, #c41e3a 0%, #8b0000 50%, #c41e3a 100%);
      color: #ffd700;
    }

    .slot-item:nth-child(4n+2) {
      background: linear-gradient(180deg, #1a6b3c 0%, #0d4d2b 50%, #1a6b3c 100%);
      color: #ffd700;
    }

    .slot-item:nth-child(4n+3) {
      background: linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
      color: #ff1493;
    }

    .slot-pointer-left,
    .slot-pointer-right {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      filter: drop-shadow(0 0 15px #ffd700);
    }

    .slot-pointer-left {
      left: -20px;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 25px 25px 25px 0;
      border-color: transparent #ffd700 transparent transparent;
      animation: pointer-pulse 0.5s infinite alternate;
    }

    .slot-pointer-right {
      right: -20px;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 25px 0 25px 25px;
      border-color: transparent transparent transparent #ffd700;
      animation: pointer-pulse 0.5s infinite alternate;
    }

    @keyframes pointer-pulse {
      0% {
        filter: drop-shadow(0 0 10px #ffd700);
        transform: translateY(-50%) scale(1);
      }

      100% {
        filter: drop-shadow(0 0 25px #ff1493);
        transform: translateY(-50%) scale(1.1);
      }
    }

    /* RESULTADO */
    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1000;
    }

    .resultado-card {
      background: linear-gradient(145deg, rgba(26, 107, 60, 0.95) 0%, rgba(10, 10, 10, 0.98) 100%);
      backdrop-filter: blur(20px);
      border-radius: 25px;
      padding: 50px 40px;
      text-align: center;
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 215, 0, 0.4);
      border: 3px solid;
      border-image: linear-gradient(135deg, #ffd700, #ff1493, #ffd700, #ff1493, #ffd700) 1;
      animation: scaleIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      z-index: 1001;
      overflow: hidden;
    }

    .resultado-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg,
          transparent 30%,
          rgba(255, 215, 0, 0.05) 50%,
          transparent 70%);
      animation: card-shine 2s linear infinite;
    }

    @keyframes scaleIn {
      0% {
        opacity: 0;
        transform: scale(0.5) rotate(-5deg);
      }

      100% {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }

    .trophy-icon {
      font-size: 6rem;
      margin-bottom: 20px;
      animation: trophy-bounce 1s infinite;
      filter: drop-shadow(0 0 30px #ffd700);
    }

    @keyframes trophy-bounce {

      0%,
      100% {
        transform: scale(1) rotate(-5deg);
      }

      50% {
        transform: scale(1.2) rotate(5deg);
      }
    }

    .resultado-titulo {
      font-family: 'Righteous', cursive;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 25px;
      color: #ffd700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
      position: relative;
      z-index: 1;
    }

    .resultado-nome-wrapper {
      margin: 30px 0;
      position: relative;
      z-index: 1;
    }

    .resultado-nome {
      display: inline-block;
      font-family: 'Righteous', cursive;
      font-size: 3.5rem;
      font-weight: 900;
      color: #ffd700;
      text-shadow:
        0 0 20px #ffd700,
        0 0 40px #ff1493,
        0 4px 30px rgba(0, 0, 0, 0.8);
      padding: 20px 40px;
      border-radius: 15px;
      background: linear-gradient(145deg, rgba(139, 0, 0, 0.5), rgba(196, 30, 58, 0.3));
      border: 3px solid #ffd700;
      animation: winner-glow 1s infinite alternate;
    }

    @keyframes winner-glow {
      0% {
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        transform: scale(1);
      }

      100% {
        box-shadow: 0 0 50px rgba(255, 215, 0, 0.8), 0 0 80px rgba(255, 20, 147, 0.5);
        transform: scale(1.05);
      }
    }

    .resultado-message {
      font-size: 1.5rem;
      font-weight: 600;
      margin-top: 20px;
      color: #ffd700;
      position: relative;
      z-index: 1;
    }

    /* CONTROLE DE SOM */
    .sound-control {

  </style>
</head>

  <!-- SCRIPTS -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    // ============================================================================
    // CONFIGURAÇÃO DE ÁUDIO - SINTETIZADOR PROCEDURAL
    // ============================================================================

    let audioContext = null;
    let musicEnabled = false;
    let sfxEnabled = true;
    let musicNodes = [];

    // Inicializar AudioContext
    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioContext;
    }

    // Tocar nota
    function playNote(frequency, startTime, duration, type = 'sine', volume = 0.1) {
      const ctx = initAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = type;
      osc.frequency.setValueAtTime(frequency, startTime);

      gain.gain.setValueAtTime(0, startTime);
      gain.gain.linearRampToValueAtTime(volume, startTime + 0.05);
      gain.gain.setValueAtTime(volume, startTime + duration - 0.1);
      gain.gain.linearRampToValueAtTime(0, startTime + duration);

      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.start(startTime);
      osc.stop(startTime + duration);

      return { osc, gain };
    }

    // Som de clique
    function playClick() {
      if (!sfxEnabled) return;
      const ctx = initAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = 'square';
      osc.frequency.setValueAtTime(800, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.1);

      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);

      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.start();
      osc.stop(ctx.currentTime + 0.1);
    }

    // Som de giro de slot
    function playSpinSound() {
      if (!sfxEnabled) return;
      const ctx = initAudio();

      function tick() {
        if (!girando) return;

        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = 'square';
        osc.frequency.setValueAtTime(200 + Math.random() * 100, ctx.currentTime);

        gain.gain.setValueAtTime(0.05, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.03);

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.start();
        osc.stop(ctx.currentTime + 0.03);

        if (girando) {
          setTimeout(tick, 50);
        }
      }

      tick();
    }

    // Som de vitória
    function playWinSound() {
      if (!sfxEnabled) return;
      const ctx = initAudio();
      const now = ctx.currentTime;

      const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6

      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now + i * 0.15);

        gain.gain.setValueAtTime(0, now + i * 0.15);
        gain.gain.linearRampToValueAtTime(0.15, now + i * 0.15 + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.5);

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.start(now + i * 0.15);
        osc.stop(now + i * 0.15 + 0.5);
      });
    }

    // Música ambiente de cassino (loop procedural)
    function startCasinoMusic() {
      if (!musicEnabled) return;

      const ctx = initAudio();

      // Criar notas do acorde
      const chords = [
        [130.81, 164.81, 196.00], // C3, E3, G3
        [146.83, 185.00, 220.00], // D3, F#3, A3
        [164.81, 207.65, 246.94], // E3, G#3, B3
        [174.61, 220.00, 261.63], // F3, A3, C4
      ];

      let chordIndex = 0;

      function playChord() {
        if (!musicEnabled) return;

        const now = ctx.currentTime;
        const chord = chords[chordIndex % chords.length];

        chord.forEach(freq => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          const filter = ctx.createBiquadFilter();

          osc.type = 'triangle';
          osc.frequency.setValueAtTime(freq, now);

          filter.type = 'lowpass';
          filter.frequency.setValueAtTime(800, now);

          gain.gain.setValueAtTime(0, now);
          gain.gain.linearRampToValueAtTime(0.03, now + 0.5);
          gain.gain.setValueAtTime(0.03, now + 1.5);
          gain.gain.linearRampToValueAtTime(0, now + 2);

          osc.connect(filter);
          filter.connect(gain);
          gain.connect(ctx.destination);

          osc.start(now);
          osc.stop(now + 2);

          musicNodes.push({ osc, gain });
        });

        chordIndex++;

        if (musicEnabled) {
          setTimeout(playChord, 2000);
        }
      }

      playChord();
    }

    function stopCasinoMusic() {
      musicNodes.forEach(node => {
        try {
          node.gain.gain.setValueAtTime(0, audioContext.currentTime);
        } catch (e) { }
      });
      musicNodes = [];
    }

    // Toggle música
    $('#btn-music').click(function () {
      $(this).toggleClass('muted');
      musicEnabled = !musicEnabled;

      if (musicEnabled) {
        initAudio();
        startCasinoMusic();
      } else {
        stopCasinoMusic();
      }
    });

    // Toggle efeitos sonoros
    $('#btn-sfx').click(function () {
      $(this).toggleClass('muted');
      sfxEnabled = !sfxEnabled;
    });

    // ============================================================================
    // CANVAS DE FUNDO ANIMADO
    // ============================================================================

    const bgCanvas = document.getElementById('casino-bg');
    const bgCtx = bgCanvas.getContext('2d');

    function resizeCanvas() {
      bgCanvas.width = window.innerWidth;
      bgCanvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Partículas
    const particles = [];
    const particleCount = 100;

    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * bgCanvas.width;
        this.y = Math.random() * bgCanvas.height;
        this.size = Math.random() * 3 + 1;
        this.speedY = Math.random() * 0.5 + 0.2;
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.opacity = Math.random() * 0.5 + 0.2;
        this.color = ['#ffd700', '#ff1493', '#00ff00', '#00bfff'][Math.floor(Math.random() * 4)];
        this.twinkle = Math.random() * Math.PI * 2;
      }

      update() {
        this.y -= this.speedY;
        this.x += this.speedX;
        this.twinkle += 0.05;

        if (this.y < -10) {
          this.y = bgCanvas.height + 10;
          this.x = Math.random() * bgCanvas.width;
        }
      }

      draw() {
        const currentOpacity = this.opacity * (0.5 + 0.5 * Math.sin(this.twinkle));
        bgCtx.beginPath();
        bgCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        bgCtx.fillStyle = this.color;
        bgCtx.globalAlpha = currentOpacity;
        bgCtx.fill();
        bgCtx.globalAlpha = 1;

        // Brilho
        bgCtx.beginPath();
        bgCtx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
        bgCtx.fillStyle = this.color;
        bgCtx.globalAlpha = currentOpacity * 0.3;
        bgCtx.fill();
        bgCtx.globalAlpha = 1;
      }
    }

    // Fichas decorativas
    const chips = [];
    const chipCount = 15;

    class Chip {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * bgCanvas.width;
        this.y = Math.random() * bgCanvas.height;
        this.size = Math.random() * 30 + 20;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.02;
        this.speedY = Math.random() * 0.3 + 0.1;
        this.speedX = (Math.random() - 0.5) * 0.2;
        this.color = ['#c41e3a', '#1a6b3c', '#ffd700', '#0a0a0a'][Math.floor(Math.random() * 4)];
        this.opacity = 0.1 + Math.random() * 0.1;
      }

      update() {
        this.y -= this.speedY;
        this.x += this.speedX;
        this.rotation += this.rotationSpeed;

        if (this.y < -50) {
          this.y = bgCanvas.height + 50;
          this.x = Math.random() * bgCanvas.width;
        }
      }

      draw() {
        bgCtx.save();
        bgCtx.translate(this.x, this.y);
        bgCtx.rotate(this.rotation);
        bgCtx.globalAlpha = this.opacity;

        // Desenhar ficha
        bgCtx.beginPath();
        bgCtx.arc(0, 0, this.size, 0, Math.PI * 2);
        bgCtx.fillStyle = this.color;
        bgCtx.fill();

        // Borda
        bgCtx.beginPath();
        bgCtx.arc(0, 0, this.size * 0.8, 0, Math.PI * 2);
        bgCtx.strokeStyle = '#ffd700';
        bgCtx.lineWidth = 2;
        bgCtx.stroke();

        // Detalhes internos
        bgCtx.beginPath();
        bgCtx.arc(0, 0, this.size * 0.3, 0, Math.PI * 2);
        bgCtx.strokeStyle = '#ffd700';
        bgCtx.lineWidth = 2;
        bgCtx.stroke();

        bgCtx.restore();
        bgCtx.globalAlpha = 1;
      }
    }

    // Inicializar partículas e fichas
    for (let i = 0; i < particleCount; i++) {
      particles.push(new Particle());
    }
    for (let i = 0; i < chipCount; i++) {
      chips.push(new Chip());
    }

    // Loop de animação do fundo
    function animateBackground() {
      bgCtx.fillStyle = 'rgba(10, 10, 10, 0.1)';
      bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

      // Desenhar fichas
      chips.forEach(chip => {
        chip.update();
        chip.draw();
      });

      // Desenhar partículas
      particles.forEach(particle => {
        particle.update();
        particle.draw();
      });

      requestAnimationFrame(animateBackground);
    }

    animateBackground();

    // ============================================================================
    // LÓGICA DO JOGO
    // ============================================================================

    let numPessoas = 0;
    let acao = '';
    let nomes = [];
    let girando = false;

    // Mostrar campo customizado
    $('#acao').change(function () {
      const val = $(this).val();
      $('#acao-custom').toggle(val === '');
      playClick();
    });

    // Selecionar número
    $('.num-btn').click(function () {
      $('.num-btn').removeClass('active');
      $(this).addClass('active');
      numPessoas = parseInt($(this).data('num'));
      playClick();
    });

    // Ir para página 2
    $('#btn-proximo1').click(function () {
      playClick();

      if (!numPessoas) {
        mostrarAlerta("Selecione o número de pessoas!");
        return;
      }

      acao = $('#acao').val() || $('#acao-custom').val().trim();
      if (!acao) {
        mostrarAlerta("Digite a ação!");
        return;
      }

      // Remover emoji se existir
      acao = acao.replace(/[^\w\sÀ-ÿ]/g, '').trim();

      $('#titulo-nomes').text(`Digite os Nomes`);
      $('#campos-nomes').empty();
      for (let i = 0; i < numPessoas; i++) {
        $('#campos-nomes').append(`
      <input type="text" class="nome-input" placeholder="Participante ${i + 1}" />
    `);
      }
      goToPage(2);
    });

    // Ir para página 3
    $('#btn-proximo2').click(function () {
      playClick();

      nomes = [];
      let valid = true;

      $('.nome-input').each(function () {
        const nome = $(this).val().trim();
        if (!nome) {
          mostrarAlerta("Preencha todos os nomes!");
          valid = false;
          return false;
        }
        nomes.push(nome);
      });

      if (!valid || nomes.length !== numPessoas) return;

      criarSlotMachine();
      $('#titulo-roleta').text(`Sorteando...`);
      goToPage(3);
    });

    // Criar a máquina caça-níquel
    function criarSlotMachine() {
      const slotReel = $('#slot-reel');
      slotReel.empty();

      const repeticoes = 25;
      for (let i = 0; i < repeticoes; i++) {
        nomes.forEach(nome => {
          slotReel.append(`<div class="slot-item">${nome}</div>`);
        });
      }

      slotReel.css('top', '0px');
    }

    // Girar slot machine
    $('#btn-girar').click(function () {
      if (girando) return;

      girando = true;
      $(this).prop('disabled', true);
      playClick();
      playSpinSound();

      const slotReel = $('#slot-reel');
      const itemHeight = window.innerWidth <= 480 ? 100 : (window.innerWidth <= 768 ? 120 : 150);

      // Escolher vencedor aleatório
      const indiceVencedor = Math.floor(Math.random() * nomes.length);
      const nomeVencedor = nomes[indiceVencedor];

      // Calcular posição final
      const voltasCompletas = 18;
      const posicaoFinalItem = (voltasCompletas * nomes.length) + indiceVencedor;
      const posicaoFinal = -(posicaoFinalItem * itemHeight) + (itemHeight / 2 - 75);

      let posicaoAtual = 0;
      let velocidade = 10;
      const velocidadeMaxima = 100;
      const aceleracao = 3;
      const desaceleracao = 0.97;
      let fase = 'acelerando';

      function animar() {
        if (fase === 'acelerando') {
          velocidade += aceleracao;
          if (velocidade >= velocidadeMaxima) {
            fase = 'constante';
          }
        } else if (fase === 'constante') {
          if (posicaoAtual <= posicaoFinal + 2500) {
            fase = 'desacelerando';
          }
        } else if (fase === 'desacelerando') {
          velocidade *= desaceleracao;
          if (velocidade < 1) velocidade = 1;
        }

        posicaoAtual -= velocidade;
        slotReel.css('top', posicaoAtual + 'px');

        if (fase === 'desacelerando' && posicaoAtual <= posicaoFinal) {
          slotReel.css('top', posicaoFinal + 'px');

          // Aguardar antes de mostrar resultado
          setTimeout(() => {
            mostrarVencedor(nomeVencedor);
          }, 1500);

          return;
        }

        requestAnimationFrame(animar);
      }

      requestAnimationFrame(animar);
    });

    // Mostrar vencedor com confetes
    function mostrarVencedor(nome) {
      playWinSound();

      $('#nome-ganhador').text(nome);
      $('#resultado-titulo').text(acao + ':');
      goToPage(4);

      iniciarConfetes();

      girando = false;
    }

    // Sistema de confetes
    function iniciarConfetes() {
      const canvas = document.getElementById('confetti-canvas');
      const ctx = canvas.getContext('2d');

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const confetes = [];
      const cores = ['#ffd700', '#ff1493', '#c41e3a', '#00ff00', '#00bfff', '#ffd700', '#ff6347', '#ffed4e'];

      class Confete {
        constructor() {
          this.x = Math.random() * canvas.width;
          this.y = -20;
          this.w = Math.random() * 12 + 6;
          this.h = Math.random() * 6 + 3;
          this.cor = cores[Math.floor(Math.random() * cores.length)];
          this.velocidadeY = Math.random() * 4 + 3;
          this.velocidadeX = Math.random() * 3 - 1.5;
          this.rotacao = Math.random() * 360;
          this.velocidadeRotacao = Math.random() * 15 - 7.5;
        }

        update() {
          this.y += this.velocidadeY;
          this.x += this.velocidadeX;
          this.rotacao += this.velocidadeRotacao;

          if (this.y > canvas.height) {
            this.y = -20;
            this.x = Math.random() * canvas.width;
          }
        }

        draw() {
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(this.rotacao * Math.PI / 180);
          ctx.fillStyle = this.cor;
          ctx.shadowColor = this.cor;
          ctx.shadowBlur = 10;
          ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
          ctx.restore();
        }
      }

      for (let i = 0; i < 250; i++) {
        confetes.push(new Confete());
      }

      let animando = true;
      let frameCount = 0;
      const duracaoTotal = 400;

      function animar() {
        if (!animando) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        confetes.forEach(confete => {
          confete.update();
          confete.draw();
        });

        frameCount++;

        if (frameCount < duracaoTotal) {
          requestAnimationFrame(animar);
        } else {
          let alpha = 1;
          function fadeOut() {
            alpha -= 0.02;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = alpha;

            confetes.forEach(confete => {
              confete.update();
              confete.draw();
            });

            if (alpha > 0) {
              requestAnimationFrame(fadeOut);
            } else {
              ctx.clearRect(0, 0, canvas.width, canvas.height);
              animando = false;
            }
          }
          fadeOut();
        }
      }

      animar();

      window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });
    }

    // Reiniciar
    $('#btn-reiniciar').click(function () {
      playClick();

      const canvas = document.getElementById('confetti-canvas');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      goToPage(1);
      $('.num-btn').removeClass('active');
      $('#acao').val('Motorista da rodada');
      $('#acao-custom').val('').hide();
      $('#btn-girar').prop('disabled', false);
      numPessoas = 0;
      nomes = [];
      girando = false;
    });

    // Função de navegação
    function goToPage(pageNum) {
      $('.page').removeClass('active').hide();
      $(`#page${pageNum}`).addClass('active').show();
    }

    // Alerta customizado
    function mostrarAlerta(mensagem) {
      alert(mensagem);
    }
  </script>
</body>
